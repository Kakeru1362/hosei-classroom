<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>法政大学 空き教室検索 - 市ヶ谷キャンパスマップ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f0;color:#333;overflow-x:hidden}
.header{background:#00205B;color:#fff;padding:12px 16px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;letter-spacing:0.5px}
.header p{font-size:12px;opacity:0.8;margin-top:2px}
.map-container{padding:8px;display:flex;justify-content:center}
svg text{pointer-events:none;user-select:none}
.building-shape{cursor:pointer;transition:fill 0.2s,opacity 0.2s,stroke 0.2s}
.building-shape:hover{opacity:0.85}
.building-noclk{cursor:default}
.controls{padding:8px 12px}
.control-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
.control-row label{font-size:12px;font-weight:600;color:#00205B;width:100%;text-align:center;margin-bottom:2px}
.btn{padding:8px 12px;border:2px solid #ddd;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#555;cursor:pointer;transition:all 0.15s;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.btn:hover{border-color:#FF6600;color:#FF6600}
.btn.active{background:#FF6600;color:#fff;border-color:#FF6600}
.btn-show-all{padding:8px 16px;border:2px solid #00205B;border-radius:8px;background:#fff;font-size:13px;font-weight:600;color:#00205B;cursor:pointer;width:100%;min-height:44px;transition:all 0.15s}
.btn-show-all:hover{background:#00205B;color:#fff}
.btn-show-all.active{background:#00205B;color:#fff}
.results{padding:8px 12px 80px}
.results-header{font-size:15px;font-weight:700;color:#00205B;margin-bottom:8px;padding:8px 0;border-bottom:2px solid #FF6600}
.building-section{margin-bottom:16px}
.building-title{font-size:14px;font-weight:700;color:#FF6600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.building-title .count{background:#FF6600;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
.room{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:6px 4px;text-align:center;font-size:12px;font-weight:500;color:#333}
.no-rooms{color:#999;font-size:13px;padding:12px;text-align:center}
.floor-group{margin-bottom:8px}
.floor-label{font-size:11px;color:#888;font-weight:600;margin-bottom:3px;padding-left:2px}
</style>
</head>

const BUILDING_KEYS = [
  { key: 'ボアソナードタワー', short: 'BT', label: 'ボアソナード・タワー' },
  { key: '外濠校舎', short: 'S', label: '外濠校舎' },
  { key: '富士見ゲート', short: 'G', label: '富士見ゲート' },
  { key: '大内山校舎', short: 'Y', label: '大内山校舎' },
  { key: '富士見坂校舎', short: 'F', label: '富士見坂校舎' }
];

let selectedDay = null;
let selectedPeriod = null;
let selectedBuilding = null;
let showAll = false;

function init() {
  const now = new Date();
  const dayIndex = now.getDay();
  const days = ['日','月','火','水','木','金','土'];
  const dayStr = days[dayIndex];

  if (['月','火','水','木','金','土'].includes(dayStr)) {
    selectedDay = dayStr;
  } else {
    selectedDay = '月';
  }

  const hour = now.getHours();
  const minute = now.getMinutes();
  const timeVal = hour * 60 + minute;
  const periodStarts = [
    { p: '1限', start: 9*60+30, end: 11*60 },
    { p: '2限', start: 11*60+10, end: 12*60+40 },
    { p: '3限', start: 13*60+30, end: 15*60 },
    { p: '4限', start: 15*60+10, end: 16*60+40 },
    { p: '5限', start: 16*60+50, end: 18*60+20 },
    { p: '6限', start: 18*60+30, end: 20*60 },
    { p: '7限', start: 20*60+10, end: 21*60+40 }
  ];

  selectedPeriod = '1限';
  for (const ps of periodStarts) {
    if (timeVal >= ps.start && timeVal <= ps.end) {
      selectedPeriod = ps.p;
      break;
    } else if (timeVal < ps.start) {
      selectedPeriod = ps.p;
      break;
    }
  }

  document.querySelectorAll('.day-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectedDay = btn.dataset.day;
      update();
    });
  });
  document.querySelectorAll('.period-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectedPeriod = btn.dataset.period;
      update();
    });
  });
  document.querySelectorAll('.building-shape').forEach(function(el) {
    el.addEventListener('click', function() {
      var bName = el.dataset.building;
      if (selectedBuilding === bName) {
        selectedBuilding = null;
      } else {
        selectedBuilding = bName;
        showAll = false;
        document.getElementById('showAllBtn').classList.remove('active');
      }
      update();
    });
  });
  document.getElementById('showAllBtn').addEventListener('click', function() {
    showAll = !showAll;
    if (showAll) {
      selectedBuilding = null;
      this.classList.add('active');
    } else {
      this.classList.remove('active');
    }
    update();
  });

  update();
}

function getRooms(day, period, building) {
  try {
    var rooms = DATA.free[day][period][building];
    return rooms || [];
  } catch(e) {
    return [];
  }
}

function groupByFloor(rooms) {
  var floors = {};
  rooms.forEach(function(r) {
    var match = r.match(/[A-Z]+(\d)/);
    var floor = match ? match[1] + 'F' : '?';
    if (!floors[floor]) floors[floor] = [];
    floors[floor] = [].concat(floors[floor], [r]);
  });
  var sorted = Object.keys(floors).sort();
  return sorted.map(function(f) { return { floor: f, rooms: floors[f] }; });
}

function update() {
  // Update day buttons
  document.querySelectorAll('.day-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.day === selectedDay);
  });
  document.querySelectorAll('.period-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.period === selectedPeriod);
  });

  // Update building highlights and badges
  BUILDING_KEYS.forEach(function(b) {
    var el = document.getElementById('bldg-' + b.short);
    var badge = document.getElementById('badge-' + b.short);
    var badgeText = document.getElementById('badge-' + b.short + '-text');
    var rooms = getRooms(selectedDay, selectedPeriod, b.key);
    var count = rooms.length;

    if (badgeText) badgeText.textContent = count;
    if (badge) {
      badge.style.display = count > 0 ? '' : 'none';
      badgeText.style.display = count > 0 ? '' : 'none';
    }

    if (el) {
      if (selectedBuilding === b.key) {
        el.setAttribute('fill', '#FF6600');
        el.setAttribute('stroke', '#cc5200');
        el.setAttribute('stroke-width', '2.5');
      } else {
        el.setAttribute('fill', '#C8D6E5');
        el.setAttribute('stroke', '#8899aa');
        el.setAttribute('stroke-width', '1');
      }
    }
  });

  // Render results
  var resultsEl = document.getElementById('results');
  var buildings = [];

  if (showAll) {
    buildings = BUILDING_KEYS;
  } else if (selectedBuilding) {
    buildings = BUILDING_KEYS.filter(function(b) { return b.key === selectedBuilding; });
  }

  if (buildings.length === 0) {
    resultsEl.innerHTML = '<div class="no-rooms">建物をタップして空き教室を表示</div>';
    return;
  }

  var totalCount = 0;
  var html = '';

  buildings.forEach(function(b) {
    var rooms = getRooms(selectedDay, selectedPeriod, b.key);
    totalCount += rooms.length;
    var groups = groupByFloor(rooms);

    html += '<div class="building-section">';
    html += '<div class="building-title">' + b.label + ' <span class="count">' + rooms.length + '室</span></div>';

    if (rooms.length === 0) {
      html += '<div class="no-rooms">空き教室はありません</div>';
    } else {
      groups.forEach(function(g) {
        html += '<div class="floor-group">';
        html += '<div class="floor-label">' + g.floor + '</div>';
        html += '<div class="room-grid">';
        g.rooms.forEach(function(r) {
          html += '<div class="room">' + r + '</div>';
        });
        html += '</div></div>';
      });
    }
    html += '</div>';
  });

  var headerLabel = showAll ? 'すべての建物' : buildings[0].label;
  resultsEl.innerHTML = '<div class="results-header">' + headerLabel + ' - ' + selectedDay + ' ' + selectedPeriod + '（' + totalCount + '室空き）</div>' + html;
}

init();
</script>
