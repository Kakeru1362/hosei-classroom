<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', 'Hiragino Sans', 'Meiryo', sans-serif; background: #F5F5F5; color: #333; }
header { background: #00205B; color: #fff; padding: 16px 20px; text-align: center; }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

.controls { padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
.btn-row:last-child { margin-bottom: 0; }
.btn { padding: 7px 14px; border: 2px solid #00205B; background: #fff; color: #00205B; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #E8EDF3; }
.btn.active { background: #00205B; color: #fff; }
.btn-show-all { padding: 7px 16px; border: 2px solid #FF6600; background: #fff; color: #FF6600; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
.btn-show-all:hover { background: #FFF0E0; }

.map-container { padding: 12px; display: flex; justify-content: center; }
svg { max-width: 100%; height: auto; }
.building-clickable { cursor: pointer; transition: opacity 0.15s; }
.building-clickable:hover { opacity: 0.8; }

.results { padding: 16px; }
.results-header { font-size: 16px; font-weight: 700; color: #00205B; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #FF6600; }
.building-section { margin-bottom: 16px; }
.building-name { font-size: 14px; font-weight: 700; color: #00205B; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.building-count { background: #FF6600; color: #fff; border-radius: 12px; padding: 2px 8px; font-size: 12px; }
.room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
.room-card { background: #fff; border: 1px solid #E0E0E0; border-radius: 8px; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; color: #333; transition: all 0.15s; }
.room-card:hover { border-color: #FF6600; box-shadow: 0 2px 6px rgba(255,102,0,0.15); }
.no-selection { text-align: center; color: #999; padding: 40px 20px; font-size: 14px; }
.no-rooms { text-align: center; color: #999; padding: 20px; font-size: 13px; }
</style>

function getCurrentDayPeriod() {
  const now = new Date();
  const dow = now.getDay();
  const dayMap = {1:'月',2:'火',3:'水',4:'木',5:'金',6:'土'};
  const day = dayMap[dow] || '月';
  const h = now.getHours();
  const m = now.getMinutes();
  const t = h * 60 + m;
  let period = '1限';
  if (t >= 570 && t < 680) period = '1限';
  else if (t >= 680 && t < 790) period = '2限';
  else if (t >= 790 && t < 900) period = '3限';
  else if (t >= 900 && t < 1010) period = '4限';
  else if (t >= 1010 && t < 1120) period = '5限';
  else if (t >= 1120 && t < 1200) period = '6限';
  else if (t >= 1200) period = '7限';
  return { day: day, period: period };
}

function getRooms(day, period, buildingName) {
  try { return DATA.free[day][period][buildingName] || []; } catch(e) { return []; }
}

function getCount(day, period, key) {
  return getRooms(day, period, KEY_TO_NAME[key]).length;
}

    selectedBuilding = null;
    BLDG_KEYS.forEach(function(k) {
      document.querySelector('#bldg-' + k + ' rect').setAttribute('fill', '#C8D6E5');
    });
    showAllResults();
  };
}

function updateButtons() {
  document.querySelectorAll('#day-btns .btn').forEach(function(btn, i) {
    btn.className = 'btn' + (DAYS[i] === selectedDay ? ' active' : '');
  });
  document.querySelectorAll('#period-btns .btn').forEach(function(btn, i) {
    btn.className = 'btn' + (PERIODS[i] === selectedPeriod ? ' active' : '');
  });
}

function updateBadges() {
  BLDG_KEYS.forEach(function(key) {
    const count = getCount(selectedDay, selectedPeriod, key);
    const badge = document.getElementById('badge-' + key);
    const text = document.getElementById('badge-text-' + key);
    text.textContent = count;
    badge.style.display = count > 0 ? '' : 'none';
    text.style.display = count > 0 ? '' : 'none';
  });
}

function updateBuildingColors() {
  BLDG_KEYS.forEach(function(k) {
    const rect = document.querySelector('#bldg-' + k + ' rect');
    rect.setAttribute('fill', k === selectedBuilding ? '#FF6600' : '#C8D6E5');
  });
}

function showBuildingResults(key) {
  const name = KEY_TO_NAME[key];
  const rooms = getRooms(selectedDay, selectedPeriod, name);
  const results = document.getElementById('results');
  if (rooms.length === 0) {
    results.innerHTML = '<div class="building-section"><div class="building-name">' + name + ' <span class="building-count">0室</span></div><div class="no-rooms">この時間帯に空き教室はありません</div></div>';
    return;
  }
  let html = '<div class="building-section"><div class="building-name">' + name + ' <span class="building-count">' + rooms.length + '室</span></div><div class="room-grid">';
  rooms.forEach(function(r) { html += '<div class="room-card">' + r + '</div>'; });
  html += '</div></div>';
  results.innerHTML = html;
}

function showAllResults() {
  const results = document.getElementById('results');
  let html = '<div class="results-header">' + selectedDay + ' ' + selectedPeriod + ' の空き教室</div>';
  BLDG_KEYS.forEach(function(key) {
    const name = KEY_TO_NAME[key];
    const rooms = getRooms(selectedDay, selectedPeriod, name);
    html += '<div class="building-section"><div class="building-name">' + name + ' <span class="building-count">' + rooms.length + '室</span></div>';
    if (rooms.length > 0) {
      html += '<div class="room-grid">';
      rooms.forEach(function(r) { html += '<div class="room-card">' + r + '</div>'; });
      html += '</div>';
    } else {
      html += '<div class="no-rooms">空き教室なし</div>';
    }
    html += '</div>';
  });
  results.innerHTML = html;
}

function updateResults() {
  if (selectedBuilding) {
    showBuildingResults(selectedBuilding);
  } else {
    document.getElementById('results').innerHTML = '<div class="no-selection">建物をタップして空き教室を確認</div>';
  }
}

function updateAll() {
  updateButtons();
  updateBadges();
  updateBuildingColors();
  updateResults();
}

function initBuildingClicks() {
  BLDG_KEYS.forEach(function(key) {
    document.getElementById('bldg-' + key).addEventListener('click', function() {
      if (selectedBuilding === key) {
        selectedBuilding = null;
      } else {
        selectedBuilding = key;
      }
      updateBuildingColors();
      updateResults();
    });
  });
}

(function init() {
  const current = getCurrentDayPeriod();
  selectedDay = current.day;
  selectedPeriod = current.period;
  initControls();
  initBuildingClicks();
  updateAll();
})();
</script>
</body>
</html>
