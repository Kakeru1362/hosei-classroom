<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>法政大学 空き教室検索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6600;--navy:#00205B;--bg:#F5F5F5;--card:#FFF;--text:#333;--sub:#666;--border:#E0E0E0;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;min-height:100vh}
header{background:linear-gradient(135deg,var(--navy) 0%,#003080 100%);color:#FFF;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
header p{font-size:11px;color:rgba(255,255,255,.7);margin-top:4px}
.container{padding:12px 16px 80px}
.section-label{font-size:13px;font-weight:600;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.section-label::before{content:'';width:3px;height:14px;background:var(--orange);border-radius:2px}
.day-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0}
.day-btn{flex:0 0 auto;min-width:52px;height:44px;border:2px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.day-btn.active{background:var(--navy);color:#FFF;border-color:var(--navy)}
.period-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.period-btn{height:52px;border:2px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;user-select:none}
.period-btn .time{font-size:10px;color:var(--sub);font-weight:400}
.period-btn.active{background:var(--orange);color:#FFF;border-color:var(--orange)}
.period-btn.active .time{color:rgba(255,255,255,.85)}
.period-btn.disabled{opacity:.35;cursor:not-allowed;background:#f0f0f0}
.period-hint{font-size:11px;color:var(--sub);margin-top:4px}
.building-row{display:flex;gap:6px;flex-wrap:wrap}
.bldg-btn{height:40px;padding:0 14px;border:2px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.bldg-btn.active{background:var(--navy);color:#FFF;border-color:var(--navy)}
.map-toggle{display:flex;gap:6px;margin-top:8px}
.map-toggle-btn{height:36px;padding:0 16px;border:2px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.map-toggle-btn.active{background:var(--orange);color:#FFF;border-color:var(--orange)}
.map-container{padding:12px;display:flex;justify-content:center}
.map-container.hidden{display:none}
svg{max-width:100%;height:auto}
.building-clickable{cursor:pointer;transition:opacity .15s}
.building-clickable:hover{opacity:.8}
.results-summary{margin:20px 0 12px;padding:12px 16px;background:linear-gradient(135deg,var(--navy),#003080);color:#FFF;border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between}
.results-summary .count{font-size:28px;font-weight:700;color:var(--orange)}
.results-summary .label{font-size:13px;opacity:.85}
.building-group{margin-bottom:16px}
.building-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 0}
.building-header .name{font-size:15px;font-weight:700;color:var(--navy)}
.building-header .badge{background:var(--orange);color:#FFF;font-size:12px;font-weight:600;padding:2px 10px;border-radius:12px}
.room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px}
.room-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;font-size:14px;font-weight:600;color:var(--navy);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.no-results{text-align:center;padding:40px 20px;color:var(--sub)}
.no-results .icon{font-size:48px;margin-bottom:12px}
.no-results .msg{font-size:15px;font-weight:500}
.notice{margin:20px 0 0;padding:12px;background:#FFF8F0;border:1px solid #FFD9B3;border-radius:8px;font-size:11px;color:#995200;line-height:1.5}
.hidden{display:none}
@media(min-width:400px){.period-grid{grid-template-columns:repeat(3,1fr)}.room-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}
</style>
</head>

const KEY_TO_NAME = { BT:'ボアソナードタワー', S:'外濠校舎', G:'富士見ゲート', Y:'大内山校舎', F:'富士見坂校舎' };
const BLDG_KEYS = ['BT','S','G','Y','F'];
const BUILDINGS = [
  { key:'ボアソナードタワー', label:'ボアソナードタワー', mapKey:'BT' },
  { key:'外濠校舎', label:'外濠校舎', mapKey:'S' },
  { key:'富士見ゲート', label:'富士見ゲート', mapKey:'G' },
  { key:'大内山校舎', label:'大内山校舎', mapKey:'Y' },
  { key:'富士見坂校舎', label:'富士見坂校舎', mapKey:'F' }
];
const DAYS = ['月','火','水','木','金','土'];
const PERIODS = [
  { label:'1限', time:'08:50-10:30' },
  { label:'2限', time:'10:40-12:20' },
  { label:'3限', time:'13:10-14:50' },
  { label:'4限', time:'15:00-16:40' },
  { label:'5限', time:'16:50-18:30' },
  { label:'6限', time:'18:35-20:15' },
  { label:'7限', time:'20:20-22:00' }
];

var selectedDay = '';
var selectedPeriods = new Set();
var selectedBuilding = null; // null = すべて, or building key string
var mapVisible = true;

function getTodayDay() {
  var d = new Date().getDay();
  var map = {1:'月',2:'火',3:'水',4:'木',5:'金',6:'土'};
  return map[d] || '月';
}

function getCurrentPeriod() {
  var now = new Date();
  var t = now.getHours() * 60 + now.getMinutes();
  if (t < 570) return '1限';
  if (t <= 660) return '1限';
  if (t <= 765) return '2限';
  if (t <= 900) return '3限';
  if (t <= 1005) return '4限';
  if (t <= 1115) return '5限';
  if (t <= 1220) return '6限';
  return '7限';
}

// --- 初期化 ---
function init() {
  // 曜日ボタン
  var dayRow = document.getElementById('dayRow');
  DAYS.forEach(function(d) {
    var btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.textContent = d;
    btn.dataset.day = d;
    btn.addEventListener('click', function() {
      selectedDay = d;
      updateUI();
    });
    dayRow.appendChild(btn);
  });

  // 時限ボタン
  var periodGrid = document.getElementById('periodGrid');
  PERIODS.forEach(function(p, idx) {
    var btn = document.createElement('button');
    btn.className = 'period-btn';
    btn.innerHTML = p.label + '<span class="time">' + p.time + '</span>';
    btn.dataset.period = p.label;
    btn.dataset.index = idx;
    btn.addEventListener('click', function() {
      handlePeriodClick(idx);
    });
    periodGrid.appendChild(btn);
  });

  // 建物ボタン
  var bldgRow = document.getElementById('bldgRow');
  var allBtn = document.createElement('button');
  allBtn.className = 'bldg-btn active';
  allBtn.textContent = 'すべて';
  allBtn.dataset.building = '';
  allBtn.addEventListener('click', function() {
    selectedBuilding = null;
    updateUI();
  });
  bldgRow.appendChild(allBtn);
  BUILDINGS.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'bldg-btn';
    btn.textContent = b.label;
    btn.dataset.building = b.key;
    btn.addEventListener('click', function() {
      selectedBuilding = b.key;
      updateUI();
    });
    bldgRow.appendChild(btn);
  });

  // マップ表示トグル
  document.getElementById('mapToggleBtn').addEventListener('click', function() {
    mapVisible = !mapVisible;
    this.classList.toggle('active', mapVisible);
    document.getElementById('mapContainer').classList.toggle('hidden', !mapVisible);
  });

  // マップ建物クリック
  BLDG_KEYS.forEach(function(mapKey) {
    document.getElementById('bldg-' + mapKey).addEventListener('click', function() {
      var bldgName = KEY_TO_NAME[mapKey];
      if (selectedBuilding === bldgName) {
        selectedBuilding = null;
      } else {
        selectedBuilding = bldgName;
      }
      updateUI();
    });
  });

  selectedDay = getTodayDay();
  selectedPeriods.add(getCurrentPeriod());
  updateUI();
}

// --- 時限の連続選択 ---
function handlePeriodClick(idx) {
  var label = PERIODS[idx].label;

  if (selectedPeriods.has(label)) {
    var sorted = getSortedPeriodIndices();
    var min = sorted[0];
    var max = sorted[sorted.length - 1];
    if (idx === min || idx === max) {
      selectedPeriods.delete(label);
      if (selectedPeriods.size === 0) selectedPeriods.add(label);
    }
  } else {
    if (selectedPeriods.size === 0) {
      selectedPeriods.add(label);
    } else {
      var sorted = getSortedPeriodIndices();
      var min = sorted[0];
      var max = sorted[sorted.length - 1];
      if (idx === min - 1 || idx === max + 1) {
        selectedPeriods.add(label);
      } else {
        selectedPeriods.clear();
        selectedPeriods.add(label);
      }
    }
  }
  updateUI();
}

function getSortedPeriodIndices() {
  var indices = [];
  selectedPeriods.forEach(function(label) {
    PERIODS.forEach(function(p, i) {
      if (p.label === label) indices.push(i);
    });
  });
  indices.sort(function(a, b) { return a - b; });
  return indices;
}

function getSelectedPeriodLabels() {
  return getSortedPeriodIndices().map(function(i) { return PERIODS[i].label; });
}

// --- 複数時限の共通空き教室 ---
function getRoomsForPeriods(day, periods, buildingKey) {
  if (periods.length === 0) return [];
  try {
    var rooms = DATA.free[day][periods[0]][buildingKey] || [];
    for (var i = 1; i < periods.length; i++) {
      var nextRooms = DATA.free[day][periods[i]][buildingKey] || [];
      var nextSet = {};
      nextRooms.forEach(function(r) { nextSet[r] = true; });
      rooms = rooms.filter(function(r) { return nextSet[r]; });
    }
    return rooms;
  } catch(e) { return []; }
}

// --- UI更新 ---
function updateUI() {
  // 曜日
  document.querySelectorAll('.day-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.day === selectedDay);
  });

  // 時限
  var sorted = getSortedPeriodIndices();
  var min = sorted.length > 0 ? sorted[0] : -1;
  var max = sorted.length > 0 ? sorted[sorted.length - 1] : -1;
  document.querySelectorAll('.period-btn').forEach(function(b) {
    var idx = parseInt(b.dataset.index);
    var isActive = selectedPeriods.has(b.dataset.period);
    b.classList.toggle('active', isActive);
    var canSelect = selectedPeriods.size === 0 || isActive || idx === min - 1 || idx === max + 1;
    b.classList.toggle('disabled', !canSelect);
  });

  // 時限ヒント
  var hint = document.getElementById('periodHint');
  if (sorted.length > 1) {
    hint.textContent = PERIODS[sorted[0]].label + '〜' + PERIODS[sorted[sorted.length - 1]].label + ' の連続空きを検索中';
  } else {
    hint.textContent = 'タップで選択。連続した時限を複数選択できます';
  }

  // 建物ボタン
  document.querySelectorAll('.bldg-btn').forEach(function(b) {
    if (!b.dataset.building) b.classList.toggle('active', selectedBuilding === null);
    else b.classList.toggle('active', b.dataset.building === selectedBuilding);
  });

  // マップ
  updateMapColors();
  updateBadges();

  // 結果
  renderResults();
}

function updateMapColors() {
  BLDG_KEYS.forEach(function(k) {
    var rect = document.querySelector('#bldg-' + k + ' rect');
    var bldgName = KEY_TO_NAME[k];
    var isSelected = selectedBuilding === null || selectedBuilding === bldgName;
    if (selectedBuilding === bldgName) {
      rect.setAttribute('fill', '#FF6600');
    } else if (selectedBuilding === null) {
      rect.setAttribute('fill', '#B0C4DE');
    } else {
      rect.setAttribute('fill', '#C8D6E5');
    }
  });
}

function updateBadges() {
  var periods = getSelectedPeriodLabels();
  BLDG_KEYS.forEach(function(key) {
    var rooms = getRoomsForPeriods(selectedDay, periods, KEY_TO_NAME[key]);
    var count = rooms.length;
    var badge = document.getElementById('badge-' + key);
    var text = document.getElementById('badge-text-' + key);
    text.textContent = count;
    badge.style.display = count > 0 ? '' : 'none';
    text.style.display = count > 0 ? '' : 'none';
  });
}

function renderResults() {
  var area = document.getElementById('resultsArea');
  var periods = getSelectedPeriodLabels();

  if (periods.length === 0) {
    area.innerHTML = '';
    return;
  }

  var buildings = BUILDINGS;
  if (selectedBuilding) {
    buildings = buildings.filter(function(b) { return b.key === selectedBuilding; });
  }

  var totalFree = 0;
  var html = '';

  buildings.forEach(function(bldg) {
    var rooms = getRoomsForPeriods(selectedDay, periods, bldg.key);
    if (rooms.length === 0) return;
    totalFree += rooms.length;
    var sorted = rooms.slice().sort(function(a, b) { return a.localeCompare(b); });
    html += '<div class="building-group">';
    html += '<div class="building-header"><span class="name">' + bldg.label + '</span><span class="badge">' + rooms.length + '室</span></div>';
    html += '<div class="room-grid">';
    sorted.forEach(function(r) { html += '<div class="room-card">' + r + '</div>'; });
    html += '</div></div>';
  });

  var periodDisplay = periods.length === 1 ? periods[0] : periods[0] + '〜' + periods[periods.length - 1];
  var summaryHtml = '<div class="results-summary">';
  summaryHtml += '<div><div class="label">' + selectedDay + '曜 ' + periodDisplay + ' の空き教室</div></div>';
  summaryHtml += '<div class="count">' + totalFree + '<span style="font-size:14px;font-weight:400;margin-left:4px">室</span></div>';
  summaryHtml += '</div>';

  if (totalFree === 0) {
    area.innerHTML = summaryHtml + '<div class="no-results"><div class="icon">&#x1F4ED;</div><div class="msg">空き教室が見つかりませんでした</div></div>';
  } else {
    area.innerHTML = summaryHtml + html;
  }
}

init();
</script>
