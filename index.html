<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>法政大学 空き教室検索</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', 'Hiragino Sans', 'Meiryo', sans-serif; background: #F5F5F5; color: #333; }
header { background: #00205B; color: #fff; padding: 16px 20px; text-align: center; }
header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
.tabs { display: flex; background: #fff; border-bottom: 2px solid #ddd; }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 700; color: #999; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab.active { color: #00205B; border-bottom-color: #FF6600; }
.controls { padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd; }
.control-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.control-label { font-size: 13px; font-weight: 700; color: #00205B; min-width: 36px; }
.dropdown { flex: 1; padding: 8px 12px; border: 2px solid #00205B; border-radius: 8px; font-size: 14px; font-weight: 600; color: #00205B; background: #fff; cursor: pointer; }
.building-btns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 8px 0; }
.bldg-btn { padding: 6px 14px; border: 2px solid #00205B; background: #fff; color: #00205B; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.bldg-btn:hover { background: #E8EDF3; }
.bldg-btn.active { background: #00205B; color: #fff; }
.bldg-btn-all { padding: 6px 14px; border: 2px solid #FF6600; background: #fff; color: #FF6600; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.bldg-btn-all.active { background: #FF6600; color: #fff; }
.map-container { padding: 12px; display: flex; justify-content: center; }
svg { max-width: 100%; height: auto; }
.building-clickable { cursor: pointer; transition: opacity 0.15s; }
.building-clickable:hover { opacity: 0.8; }
.results { padding: 16px; }
.results-header { font-size: 16px; font-weight: 700; color: #00205B; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #FF6600; }
.building-section { margin-bottom: 16px; }
.building-name { font-size: 14px; font-weight: 700; color: #00205B; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.building-count { background: #FF6600; color: #fff; border-radius: 12px; padding: 2px 8px; font-size: 12px; }
.room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
.room-card { background: #fff; border: 1px solid #E0E0E0; border-radius: 8px; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; color: #333; transition: all 0.15s; position: relative; }
.room-card:hover { border-color: #FF6600; box-shadow: 0 2px 6px rgba(255,102,0,0.15); }
.room-card .fav-star { position: absolute; top: 2px; right: 4px; font-size: 14px; cursor: pointer; color: #ddd; line-height: 1; }
.room-card .fav-star.favorited { color: #FFD700; }
.no-selection { text-align: center; color: #999; padding: 40px 20px; font-size: 14px; }
.no-rooms { text-align: center; color: #999; padding: 20px; font-size: 13px; }
.fav-section { padding: 16px; }
.fav-empty { text-align: center; color: #999; padding: 40px 20px; font-size: 14px; }
.fav-card { background: #fff; border: 1px solid #E0E0E0; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.fav-info .fav-room { font-size: 15px; font-weight: 700; color: #333; }
.fav-info .fav-building { font-size: 12px; color: #666; margin-top: 2px; }
.fav-remove { background: none; border: none; font-size: 20px; cursor: pointer; color: #ccc; padding: 4px 8px; }
.fav-remove:hover { color: #FF6600; }
.page { display: none; }
.page.active { display: block; }
</style>

const KEY_TO_NAME = {BT:'ボアソナードタワー', S:'外濠校舎', G:'富士見ゲート', Y:'大内山校舎', F:'富士見坂校舎'};
const BLDG_KEYS = ['BT','S','G','Y','F'];

let selectedDay = '';
let selectedPeriod = '';
let selectedBuildings = new Set(); // 複数選択対応
let allSelected = true;

// お気に入り（localStorageで永続化）
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('hosei_favorites') || '[]'); } catch(e) { return []; }
}
function saveFavorites(favs) {
  localStorage.setItem('hosei_favorites', JSON.stringify(favs));
}
function isFavorited(room) {
  return getFavorites().indexOf(room) !== -1;
}
function toggleFavorite(room, buildingName) {
  var favs = getFavorites();
  var idx = favs.indexOf(room);
  if (idx === -1) {
    favs.push(room);
    // 建物名も保存
    var meta = JSON.parse(localStorage.getItem('hosei_fav_meta') || '{}');
    meta[room] = buildingName;
    localStorage.setItem('hosei_fav_meta', JSON.stringify(meta));
  } else {
    favs.splice(idx, 1);
  }
  saveFavorites(favs);
  updateResults();
  renderFavorites();
}

function getCurrentDayPeriod() {
  var now = new Date();
  var dow = now.getDay();
  var dayMap = {1:'月',2:'火',3:'水',4:'木',5:'金',6:'土'};
  var day = dayMap[dow] || '月';
  var h = now.getHours();
  var m = now.getMinutes();
  var t = h * 60 + m;
  var period = '1限';
  if (t >= 530 && t < 640) period = '1限';
  else if (t >= 640 && t < 790) period = '2限';
  else if (t >= 790 && t < 900) period = '3限';
  else if (t >= 900 && t < 1000) period = '4限';
  else if (t >= 1000 && t < 1110) period = '5限';
  else if (t >= 1110 && t < 1215) period = '6限';
  else if (t >= 1215) period = '7限';
  return { day: day, period: period };
}

function getRooms(day, period, buildingName) {
  try { return DATA.free[day][period][buildingName] || []; } catch(e) { return []; }
}

function getCount(day, period, key) {
  return getRooms(day, period, KEY_TO_NAME[key]).length;
}

// タブ切り替え
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'favorites') renderFavorites();
  });
});

// プルダウン変更
document.getElementById('day-select').addEventListener('change', function() {
  selectedDay = this.value;
  updateAll();
});
document.getElementById('period-select').addEventListener('change', function() {
  selectedPeriod = this.value;
  updateAll();
});

// 建物ボタン（複数選択）
function initBuildingButtons() {
  document.getElementById('btn-all').addEventListener('click', function() {
    allSelected = true;
    selectedBuildings.clear();
    updateBuildingButtons();
    updateAll();
  });

  document.querySelectorAll('.bldg-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var key = btn.dataset.key;
      allSelected = false;
      document.getElementById('btn-all').classList.remove('active');

      if (selectedBuildings.has(key)) {
        selectedBuildings.delete(key);
        if (selectedBuildings.size === 0) {
          allSelected = true;
        }
      } else {
        selectedBuildings.add(key);
      }
      updateBuildingButtons();
      updateAll();
    });
  });
}

function updateBuildingButtons() {
  document.getElementById('btn-all').classList.toggle('active', allSelected);
  document.querySelectorAll('.bldg-btn').forEach(function(btn) {
    btn.classList.toggle('active', selectedBuildings.has(btn.dataset.key));
  });
}

// SVGマップクリック（複数選択対応）
function initBuildingClicks() {
  BLDG_KEYS.forEach(function(key) {
    document.getElementById('bldg-' + key).addEventListener('click', function() {
      allSelected = false;
      document.getElementById('btn-all').classList.remove('active');

      if (selectedBuildings.has(key)) {
        selectedBuildings.delete(key);
        if (selectedBuildings.size === 0) {
          allSelected = true;
        }
      } else {
        selectedBuildings.add(key);
      }
      updateBuildingButtons();
      updateBuildingColors();
      updateResults();
    });
  });
}

function updateBadges() {
  BLDG_KEYS.forEach(function(key) {
    var count = getCount(selectedDay, selectedPeriod, key);
    var badge = document.getElementById('badge-' + key);
    var text = document.getElementById('badge-text-' + key);
    text.textContent = count;
    badge.style.display = count > 0 ? '' : 'none';
    text.style.display = count > 0 ? '' : 'none';
  });
}

function updateBuildingColors() {
  BLDG_KEYS.forEach(function(k) {
    var rect = document.querySelector('#bldg-' + k + ' rect');
    var isSelected = allSelected || selectedBuildings.has(k);
    rect.setAttribute('fill', selectedBuildings.has(k) ? '#FF6600' : '#C8D6E5');
  });
}

function updateResults() {
  var results = document.getElementById('results');
  var keysToShow = allSelected ? BLDG_KEYS : Array.from(selectedBuildings);

  if (keysToShow.length === 0) {
    results.innerHTML = '<div class="no-selection">建物を選択してください</div>';
    return;
  }

  var html = '<div class="results-header">' + selectedDay + ' ' + selectedPeriod + ' の空き教室</div>';
  keysToShow.forEach(function(key) {
    var name = KEY_TO_NAME[key];
    var rooms = getRooms(selectedDay, selectedPeriod, name);
    html += '<div class="building-section"><div class="building-name">' + name + ' <span class="building-count">' + rooms.length + '室</span></div>';
    if (rooms.length > 0) {
      html += '<div class="room-grid">';
      rooms.forEach(function(r) {
        var starred = isFavorited(r) ? ' favorited' : '';
        html += '<div class="room-card">' + r + '<span class="fav-star' + starred + '" data-room="' + r + '" data-building="' + name + '">&#9733;</span></div>';
      });
      html += '</div>';
    } else {
      html += '<div class="no-rooms">空き教室なし</div>';
    }
    html += '</div>';
  });
  results.innerHTML = html;

  // お気に入り星クリックイベント
  document.querySelectorAll('.fav-star').forEach(function(star) {
    star.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleFavorite(star.dataset.room, star.dataset.building);
    });
  });
}

function renderFavorites() {
  var container = document.getElementById('fav-list');
  var favs = getFavorites();
  var meta = JSON.parse(localStorage.getItem('hosei_fav_meta') || '{}');

  if (favs.length === 0) {
    container.innerHTML = '<div class="fav-empty">教室の★をタップしてお気に入りに追加</div>';
    return;
  }

  var html = '<div class="results-header">お気に入り教室</div>';
  favs.forEach(function(room) {
    var building = meta[room] || '';
    html += '<div class="fav-card"><div class="fav-info"><div class="fav-room">' + room + '</div><div class="fav-building">' + building + '</div></div><button class="fav-remove" data-room="' + room + '">&#x2715;</button></div>';
  });
  container.innerHTML = html;

  document.querySelectorAll('.fav-remove').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var favs = getFavorites();
      var idx = favs.indexOf(btn.dataset.room);
      if (idx !== -1) favs.splice(idx, 1);
      saveFavorites(favs);
      renderFavorites();
    });
  });
}

function updateAll() {
  updateBadges();
  updateBuildingColors();
  updateResults();
}

(function init() {
  var current = getCurrentDayPeriod();
  selectedDay = current.day;
  selectedPeriod = current.period;

  // プルダウンの初期値を設定
  document.getElementById('day-select').value = selectedDay;
  document.getElementById('period-select').value = selectedPeriod;

  initBuildingButtons();
  initBuildingClicks();
  updateAll();
})();
</script>
